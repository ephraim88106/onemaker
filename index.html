<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트 - 당신은 어떤 동물인가요?</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <!-- TensorFlow.js and Teachable Machine Image libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="noise"></div>
    <main class="container">
        <header class="hero">
            <h1 class="title">AI 동물상 테스트</h1>
            <p class="subtitle">얼굴로 보는 인공지능 동물상 분석</p>
        </header>

        <section class="test-area">
            <div id="upload-container" class="upload-wrapper">
                <div class="upload-placeholder" id="upload-placeholder">
                    <div class="upload-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    </div>
                    <button type="button" class="btn-upload" id="btn-upload">사진 올리기</button>
                    <p class="hint">클릭하거나 파일을 드래그하여 업로드하세요</p>
                    <input type="file" id="file-input" accept="image/*" hidden>
                </div>
                <img id="image-preview" class="image-preview" src="" alt="Preview" style="display: none;">
                <div id="loading-overlay" class="loading-overlay" style="display: none;">
                    <div class="loader"></div>
                    <p>분석 중...</p>
                </div>
            </div>
            
            <div id="label-container" class="results-wrapper">
                <!-- Predictions will be injected here -->
            </div>
        </section>

        <footer class="footer">
            <p>© 2026 Animal Face AI Project. Powered by Teachable Machine.</p>
        </footer>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
